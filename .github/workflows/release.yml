name: Release

# Publish to crates.io when a semver tag is pushed (e.g., `git tag v0.1.0 && git push origin v0.1.0`).
# Requires the `CARGO_REGISTRY_TOKEN` repository secret to be set
# (Settings → Secrets and variables → Actions → New repository secret).
on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Verify tag + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          crate=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi
      - run: cargo test --all-targets

  publish:
    name: cargo publish
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `gh release create --generate-notes` can
          # find the previous tag and compute the changelog window.
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" --generate-notes --title "$tag"
